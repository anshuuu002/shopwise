    /* Neo-Brutalist scrollbar and core styling */
    :root {

    @keyframes laser-sweep {

      50% { top: 100%; opacity: 1; }
      100% { top: 0%; opacity: 0.8; }
    }
    .scanner-laser {
      animation: laser-sweep 2s ease-in-out infinite;
    }

    /* Infinite horizontal marquee text */
    @keyframes marquee {
      0% { transform: translateX(0%); }
      100% { transform: translateX(-50%); }
    }
    .marquee-track {
      animation: marquee 20s linear infinite;
    }
    .marquee-track-reverse {
      animation: marquee 20s linear infinite reverse;
    }

    /* Scale bounce on cart modification */
    @keyframes bounce-brutalist {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1) translateY(-2px); }
    }
    .animate-bump {
      animation: bounce-brutalist 0.3s ease-out;

    const COMPETITORS = {
      blinkit: { name: "Blinkit", baseMultiplier: 1.02, coupon: "BLINK10", couponDiscountPercent: 10, etaMin: 10, etaMax: 15 },
      zepto: { name: "Zepto", baseMultiplier: 0.98, coupon: "ZEPTOSAVE", couponDiscountPercent: 12, etaMin: 8, etaMax: 12 },
      instamart: { name: "Swiggy Instamart", baseMultiplier: 1.05, coupon: "INSTA20", couponDiscountPercent: 15, etaMin: 12, etaMax: 18 },
      jiomart: { name: "JioMart", baseMultiplier: 0.88, coupon: "JIOMART5", couponDiscountPercent: 5, etaMin: 20, etaMax: 35 }
    };

    const getCompetitorDetails = (product, competitorId, multiplierConfig = {}) => {
      const config = COMPETITORS[competitorId];
      const mult = multiplierConfig[competitorId] || config.baseMultiplier;
      
      const rawPrice = Math.round(product.price * mult);
      const couponPercent = config.couponDiscountPercent;
      const finalPrice = Math.round(rawPrice * (1 - couponPercent / 100));
      
      return {
        store: config.name,
        price: rawPrice,
        coupon: config.coupon,
        couponDiscountPercent: couponPercent,
        eta: `${Math.round(parseInt(product.eta) * (config.etaMin / 8))} mins`,
        finalPrice: finalPrice,
        deliveryMinutes: Math.round(parseInt(product.eta) * (config.etaMin / 8))
      };
    };

    // --- MAIN APP ---
    function App() {
      // Router view state
      const [view, setView] = useState('landing'); // 'landing' | 'app-home' | 'app-dashboard' | 'app-admin' | 'app-checkout'
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');
      const [isSearchFocused, setIsSearchFocused] = useState(false);
      const [isSearching, setIsSearching] = useState(false);
      const [searchQueryDebounced, setSearchQueryDebounced] = useState('');

      useEffect(() => {
        if (searchQuery.trim() === '') {
          setSearchQueryDebounced('');
          setIsSearching(false);
          return;
        }
        setIsSearching(true);
        const timer = setTimeout(() => {
          setSearchQueryDebounced(searchQuery);
          setIsSearching(false);
        }, 300); // 300ms medium speed simulated scanner latency
        return () => clearTimeout(timer);
      }, [searchQuery]);
      
      // Database & overrides
      const [catalog, setCatalog] = useState(PRODUCT_CATALOG);
      const [competitorMultipliers, setCompetitorMultipliers] = useState({
        blinkit: COMPETITORS.blinkit.baseMultiplier,
        zepto: COMPETITORS.zepto.baseMultiplier,
        instamart: COMPETITORS.instamart.baseMultiplier,
        jiomart: COMPETITORS.jiomart.baseMultiplier
      });

      // User state
      const [cart, setCart] = useState([]);
      const [wishlist, setWishlist] = useState([]);
      const [selectedProduct, setSelectedProduct] = useState(null);
      const [compareProduct, setCompareProduct] = useState(null);
      
      // Global cart animations and triggers
      const [cartBounce, setCartBounce] = useState(false);
      const [cartDrawerOpen, setCartDrawerOpen] = useState(false);
      const [cartStrategy, setCartStrategy] = useState('balanced'); // 'balanced' | 'cheapest' | 'fastest'
      
      // Address Selection
      const [addresses, setAddresses] = useState([
        { id: 1, label: "Home", text: "Flat 402, Skyline Heights, BKC West, Mumbai - 400001", active: true },
        { id: 2, label: "Office", text: "WeWork BKC, bkCG Block, Bandra East, Mumbai - 400051", active: false }
      ]);
      const [addressPickerOpen, setAddressPickerOpen] = useState(false);

      // Dashboard stats
      const [lifetimeSavings, setLifetimeSavings] = useState(482.40);
      const [priceAlerts, setPriceAlerts] = useState([
        { id: 1, productName: "Amul Butter (Pasteurized)", targetPrice: 230, currentPrice: 245 },
        { id: 2, productName: "Hass Avocado (Imported)", targetPrice: 170, currentPrice: 189 }
      ]);
      const [orders, setOrders] = useState(() => {
        try {
          const local = localStorage.getItem('shopwise_orders_brutalist');
          return local ? JSON.parse(local) : [
            { id: "SW-8812", date: "21 Jun 2026", itemsCount: 3, total: 372, savings: 84, status: "Delivered", eta: "Delivered" },
            { id: "SW-5421", date: "16 Jun 2026", itemsCount: 1, total: 245, savings: 30, status: "Delivered", eta: "Delivered" }
          ];
        } catch (e) {
          console.error("Failed to parse orders from localStorage:", e);
          return [
            { id: "SW-8812", date: "21 Jun 2026", itemsCount: 3, total: 372, savings: 84, status: "Delivered", eta: "Delivered" },
            { id: "SW-5421", date: "16 Jun 2026", itemsCount: 1, total: 245, savings: 30, status: "Delivered", eta: "Delivered" }
          ];
        }
      });

      useEffect(() => {
        localStorage.setItem('shopwise_orders_brutalist', JSON.stringify(orders));
      }, [orders]);

      // Notification feedback
      const [notification, setNotification] = useState(null);
      const showNotification = (msg) => {
        setNotification(msg);
        setTimeout(() => setNotification(null), 3000);
      };

      const activeAddress = addresses.find(a => a.active) || addresses[0];

      // --- ADD/REMOVE ACTIONS ---
      const handleAddToCart = (product) => {
        setCart(prevCart => {
          const existing = prevCart.find(item => item.product.id === product.id);
          if (existing) {
            return prevCart.map(item =>
              item.product.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
            );
          }
          return [...prevCart, { product, quantity: 1 }];
        });
        setCartBounce(true);
        setTimeout(() => setCartBounce(false), 500);
        showNotification(`${product.name} added to cart!`);
      };

      const handleRemoveFromCart = (product) => {
        setCart(prevCart => {
          const existing = prevCart.find(item => item.product.id === product.id);
          if (!existing) return prevCart;
          if (existing.quantity === 1) {
            return prevCart.filter(item => item.product.id !== product.id);
          }
          return prevCart.map(item =>
            item.product.id === product.id ? { ...item, quantity: item.quantity - 1 } : item
          );
        });
      };

      const handleClearCart = () => {
        setCart([]);
        showNotification("Cart cleared");
      };

      const handleToggleWishlist = (productId) => {
        setWishlist(prev => {
          const updated = prev.includes(productId) 
            ? prev.filter(id => id !== productId)
            : [...prev, productId];
          const prodName = catalog.find(p => p.id === productId)?.name;
          showNotification(prev.includes(productId) ? `${prodName} removed from saved` : `${prodName} saved!`);
          return updated;
        });
      };

      // --- CALCULATIONS FOR AI SMART CART ---
      const cartCalculations = useMemo(() => {
        if (cart.length === 0) return { balanced: null, cheapest: null, fastest: null };

        let balancedItems = [], balancedTotal = 0, balancedOriginalTotal = 0, balancedETAs = [];
        let cheapestItems = [], cheapestTotal = 0;
        let fastestItems = [], fastestTotal = 0;

        cart.forEach(({ product, quantity }) => {
          balancedOriginalTotal += product.mrp * quantity;

          const bl = getCompetitorDetails(product, 'blinkit', competitorMultipliers);
          const zp = getCompetitorDetails(product, 'zepto', competitorMultipliers);
          const im = getCompetitorDetails(product, 'instamart', competitorMultipliers);
          const jm = getCompetitorDetails(product, 'jiomart', competitorMultipliers);

          const choices = [
            { store: 'ShopWise AI', price: product.price, eta: parseInt(product.eta) },
            { store: 'Blinkit', price: bl.finalPrice, eta: bl.deliveryMinutes },
            { store: 'Zepto', price: zp.finalPrice, eta: zp.deliveryMinutes },
            { store: 'Swiggy Instamart', price: im.finalPrice, eta: im.deliveryMinutes },
            { store: 'JioMart', price: jm.finalPrice, eta: jm.deliveryMinutes }
          ];
          
          // cheapest Choice
          const cheapestChoice = [...choices].sort((a,b) => a.price - b.price)[0];
          cheapestItems.push({ product, quantity, sourcedFrom: cheapestChoice.store, finalUnit: cheapestChoice.price });
          cheapestTotal += cheapestChoice.price * quantity;

          // fastest Choice
          const fastestChoice = [...choices].sort((a,b) => a.eta - b.eta)[0];
          fastestItems.push({ product, quantity, sourcedFrom: fastestChoice.store, finalUnit: fastestChoice.price });
          fastestTotal += fastestChoice.price * quantity;

          // Balanced Choice (ShopWise AI or best candidate)
          let balancedChoice = choices[0]; // ShopWise default
          const bestComp = [bl, zp, im, jm].sort((a,b) => a.finalPrice - b.finalPrice)[0];
          if (bestComp.finalPrice < product.price * 0.85 && bestComp.deliveryMinutes <= 15) {
            balancedChoice = { store: bestComp.store, price: bestComp.finalPrice, eta: bestComp.deliveryMinutes };
          }
          
          balancedItems.push({ product, quantity, sourcedFrom: balancedChoice.store, finalUnit: balancedChoice.price });
          balancedTotal += balancedChoice.price * quantity;
          balancedETAs.push(balancedChoice.eta);
        });

        const balancedMaxEta = Math.max(...balancedETAs, 10);
        const cheapestMaxEta = Math.max(28, ...cart.map(i => parseInt(i.product.eta) * 3));
        const fastestMaxEta = Math.min(8, ...cart.map(i => parseInt(i.product.eta)));

        return {
          balanced: {
            items: balancedItems,
            totalPrice: balancedTotal,
            saving: Math.max(0, balancedOriginalTotal - balancedTotal),
            eta: `${balancedMaxEta} MINS`,
            description: "Maximum package savings while keeping checkout in a single quick delivery.",
            deliveriesCount: 1,
            shippingFee: balancedTotal > 299 ? 0 : 25
          },
          cheapest: {
            items: cheapestItems,
            totalPrice: cheapestTotal,
            saving: Math.max(0, balancedOriginalTotal - cheapestTotal),
            eta: `${Math.round(cheapestMaxEta)} MINS`,
            description: "Sourced item-by-item from the absolute lowest price stores. May result in split arrivals.",
            deliveriesCount: 2,
            shippingFee: 35
          },
          fastest: {
            items: fastestItems,
            totalPrice: fastestTotal,
            saving: Math.max(0, balancedOriginalTotal - fastestTotal),
            eta: `${fastestMaxEta} MINS`,
            description: "Prioritizes immediate micro-warehouse dispatch for lightning-fast arrival.",
            deliveriesCount: 1,
            shippingFee: 49
          }
        };
      }, [cart, competitorMultipliers]);

      const currentCartSummary = useMemo(() => {
        if (!cartCalculations[cartStrategy]) return null;
        return cartCalculations[cartStrategy];
      }, [cartCalculations, cartStrategy]);

      // Category filter catalog
      const filteredProducts = useMemo(() => {
        let result = catalog;
        if (selectedCategory !== 'all') {
          result = result.filter(p => p.category === selectedCategory);
        }
        if (searchQueryDebounced.trim() !== '') {
          result = result.filter(p => 
            p.name.toLowerCase().includes(searchQueryDebounced.toLowerCase()) ||
            p.brand.toLowerCase().includes(searchQueryDebounced.toLowerCase())

        return result;

      const searchSuggestions = useMemo(() => {
        if (searchQueryDebounced.trim() === '') return [];
        return catalog.filter(p =>

                      {searchSuggestions.map(p => (

                            <p className="text-xs font-extrabold text-charcoal truncate mt-0.5">{p.name}</p>
                          </div>
                          <div className="text-right">
                            <p className="text-xs font-black text-charcoal">₹{p.price}</p>
                            <span className="text-[9px] text-charcoal font-black bg-peach px-1.5 py-0.5 rounded-md border border-charcoal">{p.discount}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {/* Navigation Anchors for Landing Page */}
              {view === 'landing' && (
                <div className="hidden lg:flex items-center gap-8">
                  <a className="font-display text-sm font-black hover:text-peach uppercase tracking-tight transition-colors" href="#about">About</a>
                  <a className="font-display text-sm font-black hover:text-peach uppercase tracking-tight transition-colors" href="#features">Features</a>

                  <a className="font-display text-sm font-black hover:text-peach uppercase tracking-tight transition-colors" href="#providers">Providers</a>
                  <a className="font-display text-sm font-black hover:text-peach uppercase tracking-tight transition-colors" href="#founder">Founder</a>
                </div>

              {/* Action Buttons */}
              <div className="flex items-center gap-2">
                
                {view !== 'landing' && (
                  <>
                    <button 
                      onClick={() => setView('app-admin')}
                      className={`p-2.5 rounded-xl border-2 border-charcoal transition-all hover:translate-x-[-1px] hover:translate-y-[-1px] ${view === 'app-admin' ? 'bg-peach text-white shadow-brutalist-sm' : 'bg-white text-charcoal hover:bg-cream shadow-brutalist-sm'}`}
                      title="Adjust Competitor Factors"
                    >
                      <Icons.Database className="w-4.5 h-4.5" />

                    <button 
                      onClick={() => setView('app-dashboard')}

                    >
                      <Icons.User className="w-4.5 h-4.5" />
                    </button>
                  </>

                {/* Main Launch / Cart Trigger */}
                {view === 'landing' ? (
                  <button
                    onClick={() => setView('app-home')}

                  <button

                  >
                    <div className="relative">
                      <Icons.ShoppingCart className="w-4.5 h-4.5 text-peach fill-peach" />
                      {cart.length > 0 && (
                        <span className="absolute -top-3 -right-3 bg-peach text-white text-[9px] font-black w-4.5 h-4.5 rounded-full flex items-center justify-center border-2 border-charcoal">
                          {cart.reduce((acc, i) => acc + i.quantity, 0)}
                        </span>
                      )}
                    </div>
                    <span className="hidden md:inline text-xs font-black">
                      {cart.length > 0 ? `₹${currentCartSummary?.totalPrice || 0}` : "Cart"}
                    </span>
                  </button>
                )}

              </div>

            </div>
          </header>

          {/* NOTIFICATION TOAST */}
          {notification && (
            <div className="fixed top-20 right-4 left-4 md:left-auto md:w-80 bg-charcoal text-white px-4 py-3.5 rounded-2xl shadow-brutalist flex items-center gap-3 z-50 border-2 border-charcoal animate-pop-in">
              <Icons.Sparkles className="w-5 h-5 text-peach shrink-0 fill-peach" />
              <span className="text-xs font-extrabold">{notification}</span>

          {/* MAIN PAGE BODY ROUTER */}

            {view === 'app-home' && (

            {view === 'app-dashboard' && (

                  setPriceAlerts={setPriceAlerts}

                  setAddresses={setAddresses}

            {view === 'app-admin' && (

                <AdminPanel

                  setCompetitorMultipliers={setCompetitorMultipliers}

                  setCatalog={setCatalog}

            {view === 'app-checkout' && (

                <CheckoutView 
                  cart={cart}
                  currentCartSummary={currentCartSummary}
                  cartStrategy={cartStrategy}
                  addresses={addresses}
                  setOrders={setOrders}
                  setCart={setCart}
                  setLifetimeSavings={setLifetimeSavings}

                  showNotification={showNotification}

            )}
          </main>

          {/* PRODUCT DETAIL MODAL */}
          {selectedProduct && (
            <ProductDetailModal 
              product={selectedProduct}
              onClose={() => setSelectedProduct(null)}
              handleAddToCart={handleAddToCart}
              handleRemoveFromCart={handleRemoveFromCart}
              cart={cart}
              wishlist={wishlist}
              handleToggleWishlist={handleToggleWishlist}
              setCompareProduct={setCompareProduct}
              competitorMultipliers={competitorMultipliers}
            />
          )}

          {/* COMPARISON DRAWER */}
          {compareProduct && (
            <ComparisonDrawer 
              product={compareProduct}
              onClose={() => setCompareProduct(null)}
              competitorMultipliers={competitorMultipliers}
              handleAddToCart={handleAddToCart}
              cart={cart}
              setCartStrategy={setCartStrategy}
              setCartDrawerOpen={setCartDrawerOpen}
            />
          )}

          {/* SMART CART AI DRAWER */}
          {cartDrawerOpen && (
            <SmartCartDrawer 
              cart={cart}
              onClose={() => setCartDrawerOpen(false)}
              cartCalculations={cartCalculations}
              cartStrategy={cartStrategy}
              setCartStrategy={setCartStrategy}
              handleAddToCart={handleAddToCart}
              handleRemoveFromCart={handleRemoveFromCart}
              handleClearCart={handleClearCart}
              setView={setView}
            />
          )}

          {/* ADDRESS PICKER MODAL */}
          {addressPickerOpen && (
            <AddressPickerModal 
              addresses={addresses}
              setAddresses={setAddresses}

            />

          {/* MOBILE BOTTOM NAVIGATION */}
          {view !== 'landing' && (
            <nav className="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-charcoal py-2 px-6 flex items-center justify-between md:hidden z-30 shadow-[0_-4px_0_#0A0A0A]">

    // --- LANDING VIEW COMPONENT (Inspired by quickv.in) ---
    function LandingView({ setView, catalog, competitorMultipliers }) {
      return (
        <div className="w-full flex flex-col items-center">
          
          {/* HERO SECTION */}
          <section id="home" className="w-full pt-16 pb-24 px-4 md:px-8 max-w-6xl flex flex-col lg:flex-row items-center justify-between gap-12 relative overflow-hidden">
            
            {/* Background Big Decorative Text */}
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-[0.03] select-none z-0">

            {/* Left Column: Heading & Badges */}

              <div className="inline-block px-5 py-2 bg-white text-peach shadow-brutalist-sm font-display text-xs md:text-sm font-black uppercase tracking-wider border-2 border-charcoal rounded-full transform -rotate-1">

              </div>

              <h1 className="text-5xl md:text-7xl font-black leading-[0.9] text-charcoal uppercase tracking-tight">
                Every Store.<br/>
                <span className="font-italic text-peach lowercase pr-3">one app.</span><br/>
                <span className="relative inline-block text-charcoal">
                  Real Savings.
                  <span className="absolute bottom-1 left-0 w-full h-3 bg-sage/40 -z-10 rounded-full"></span>
                </span>
              </h1>

              <p className="text-sm md:text-base font-semibold text-charcoal/80 max-w-xl leading-relaxed border-l-4 border-peach pl-6">
                ShopWise aggregates Blinkit, Zepto, Swiggy Instamart, and JioMart under one roof. Compare prices, optimize carts, and checkout instantly.

              <div className="flex flex-col sm:flex-row gap-4 pt-4">

    // --- INTERACTIVE LIVE SCANNER SIMULATOR ---
    function LiveScannerSimulator({ catalog, competitorMultipliers }) {
      const [selectedId, setSelectedId] = useState(1);
      const [isScanning, setIsScanning] = useState(false);
      const [scanFinished, setScanFinished] = useState(true);

      const activeProduct = catalog.find(p => p.id === selectedId) || catalog[0];

      // Generate rates list
      const comparisonList = useMemo(() => {
        const bl = getCompetitorDetails(activeProduct, 'blinkit', competitorMultipliers);
        const zp = getCompetitorDetails(activeProduct, 'zepto', competitorMultipliers);
        const im = getCompetitorDetails(activeProduct, 'instamart', competitorMultipliers);
        const jm = getCompetitorDetails(activeProduct, 'jiomart', competitorMultipliers);

        return [
          { store: 'Blinkit', price: bl.finalPrice, eta: bl.eta },
          { store: 'Zepto', price: zp.finalPrice, eta: zp.eta },
          { store: 'Swiggy Instamart', price: im.finalPrice, eta: im.eta },
          { store: 'JioMart', price: jm.finalPrice, eta: jm.eta }
        ].sort((a,b) => a.price - b.price);
      }, [activeProduct, competitorMultipliers]);

      const winner = comparisonList[0];

      const triggerScan = () => {
        if (isScanning) return;
        setIsScanning(true);
        setScanFinished(false);
        setTimeout(() => {
          setIsScanning(false);
          setScanFinished(true);
        }, 1800);
      };

      return (
        <div className="bg-white border-4 border-charcoal rounded-3xl p-5 md:p-8 max-w-xl mx-auto shadow-brutalist-lg relative text-left">
          
          {/* Scanner Selector */}
          <div className="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between mb-6 pb-4 border-b-2 border-charcoal">
            <div>
              <span className="text-[10px] font-black text-gray-400 uppercase">Target Item</span>
              <select
                value={selectedId}
                onChange={(e) => { setSelectedId(parseInt(e.target.value)); setScanFinished(false); }}
                className="w-full mt-1 bg-cream border-2 border-charcoal px-3 py-2 rounded-xl text-xs font-black focus:outline-none"
              >
                {catalog.map(p => (
                  <option key={p.id} value={p.id}>{p.name}</option>
                ))}
              </select>
            </div>

            <button
              onClick={triggerScan}
              disabled={isScanning}
              className="w-full sm:w-auto px-5 py-3 bg-charcoal text-white hover:bg-charcoal/90 rounded-xl text-xs font-black border-2 border-charcoal shadow-brutalist-sm hover:translate-x-[1px] hover:translate-y-[1px] transition-all self-end"
            >
              {isScanning ? "Scanning..." : "Initiate Live Scan"}
            </button>
          </div>

          {/* Scanner Screen Box */}
          <div className="relative border-4 border-charcoal bg-charcoal rounded-2xl p-6 overflow-hidden h-72 flex flex-col justify-between">
            
            {/* Scanner Grid Lines */}
            <div className="absolute inset-0 bg-[linear-gradient(to_bottom,rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(to_right,rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:16px_16px] pointer-events-none"></div>

            {/* Sweep laser beam */}
            {isScanning && (
              <div className="scanner-laser absolute left-0 right-0 h-1 bg-peach shadow-[0_0_15px_#FF5A36] z-10"></div>
            )}

            {/* Live Indicator */}
            <div className="flex items-center justify-between text-xs font-black text-white z-10">
              <span className="uppercase tracking-widest text-[9px] text-peach">SCANNER STATUS: {isScanning ? 'RUNNING' : 'IDLE'}</span>
              <span className="text-sage uppercase text-[9px]">[ SCANNER ACTIVE ]</span>
            </div>

            {/* Scanning results layer */}
            <div className="flex-1 flex flex-col justify-center space-y-3.5 z-10 mt-4">
              {isScanning ? (
                // Scanning placeholder
                <div className="text-center py-6 space-y-3">
                  <div className="w-8 h-8 rounded-full border-4 border-peach border-t-transparent animate-spin mx-auto"></div>
                  <p className="text-[10px] text-peach font-black uppercase tracking-widest">Accessing live dark-store APIs...</p>
                </div>
              ) : scanFinished ? (
                // Results Ranked List
                <div className="space-y-2">
                  {comparisonList.map((item, idx) => {
                    const isWinning = item.store === winner.store;
                    return (
                      <div 
                        key={item.store} 
                        className={`flex items-center justify-between p-2.5 rounded-xl border-2 transition-all ${
                          isWinning 
                            ? 'bg-sage border-charcoal text-white shadow-brutalist-sm translate-x-1' 
                            : 'bg-white border-charcoal text-charcoal'
                        }`}
                      >
                        <div className="flex items-center gap-2">
                          <span className="text-xs font-black">{item.store}</span>
                          {isWinning && (
                            <span className="text-[8px] font-black bg-peach text-white px-2 py-0.5 rounded border border-charcoal uppercase">WINNER</span>
                          )}
                        </div>
                        <div className="text-right">
                          <span className="text-sm font-black">₹{item.price}</span>
                          <span className={`text-[9px] block ${isWinning ? 'text-white/80' : 'text-gray-400'}`}>ETA: {item.eta}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              ) : (
                <div className="text-center py-10">
                  <p className="text-gray-400 text-xs font-semibold">Select an item and press "Initiate Live Scan" to compare.</p>
                </div>
              )}
            </div>

            {/* Bottom feed footer */}
            <div className="text-[9px] text-gray-500 font-bold uppercase text-center border-t border-white/10 pt-2.5 z-10">
              *Live rates aggregated for BKC/Bandra region
            </div>

          </div>

          {/* Winner details box */}
          {scanFinished && !isScanning && (
            <div className="mt-4 p-4 bg-sage text-white border-2 border-charcoal shadow-brutalist rounded-xl flex items-center justify-between">
              <div>
                <p className="text-[10px] font-black uppercase text-peach leading-none">Best Deal Found</p>
                <h4 className="text-base font-black uppercase mt-1">Sourced via {winner.store}</h4>
              </div>
              <div className="text-right">
                <span className="text-2xl font-black text-white">₹{winner.price}</span>
                <p className="text-[9px] opacity-80 leading-none">Instant dispatch ({winner.eta})</p>
              </div>
            </div>
          )}

        </div>
      );
    }

    function SmartCartDrawer({ 
      cart, onClose, cartCalculations, cartStrategy, setCartStrategy, 
      handleAddToCart, handleRemoveFromCart, handleClearCart, setView 
    }) {
      const isCartEmpty = cart.length === 0;
      const currentDetails = cartCalculations[cartStrategy];
      const [isSplitting, setIsSplitting] = useState(false);

      const changeStrategy = (strategy) => {
        if (strategy === cartStrategy) return;
        setIsSplitting(true);
        setCartStrategy(strategy);
        setTimeout(() => {
          setIsSplitting(false);
        }, 500); // 500ms mock comparison calculations

      const checkoutSelectedCart = () => {
        if (isCartEmpty) return;
        setView('app-checkout');
        onClose();
      };

      return (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex justify-end animate-fade-in" onClick={onClose}>
          <div 
            onClick={(e) => e.stopPropagation()}

            id: orderId,
            strategy: cartStrategy,

                  <div className="space-y-3">
                    {orders.map(order => (
                      <div key={order.id} className="p-4 bg-cream/40 rounded-2xl border-2 border-charcoal flex flex-col md:flex-row md:items-center justify-between gap-3 text-xs font-semibold">
                        <div className="space-y-1">
                          <div className="flex items-center gap-2">
                            <span className="font-black text-charcoal">{order.id}</span>
                            <span className="text-[9px] font-black text-white bg-sage px-1.5 py-0.5 rounded border border-charcoal uppercase">{order.status}</span>
                          </div>
                          <p className="text-[10px] text-gray-400">{order.date} • {order.itemsCount} items</p>
                        </div>

                        <div>
                          <span className="text-[9px] text-gray-400 block uppercase">Paid Amount</span>
                          <strong className="text-charcoal font-black">₹{order.total}</strong>
                        </div>

                        <div>
                          <span className="text-[9px] text-peach block font-black uppercase">Savings Yield</span>
                          <strong className="text-peach font-black">₹{order.savings}</strong>
                        </div>

                        <span className="text-[10px] text-gray-500 font-black">ETA: {order.eta}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              {/* Wishlist */}
              <div className="bg-white p-5 rounded-3xl border-4 border-charcoal space-y-4 shadow-brutalist">
                <h3 className="text-sm font-black uppercase text-charcoal flex items-center gap-2 border-b-2 border-charcoal pb-2">
                  <Icons.Heart className="w-4.5 h-4.5 text-rose-500 fill-rose-500" />
                  Saved Products Directory
                </h3>
                
                {wishlistedItems.length === 0 ? (
                  <p className="text-xs text-gray-400 font-semibold py-6 text-center">No saved items.</p>
                ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    {wishlistedItems.map(p => (
                      <div key={p.id} className="p-3 bg-cream/30 rounded-2xl border-2 border-charcoal flex items-center justify-between gap-3 shadow-brutalist-sm">
                        <div className="flex items-center gap-3">
                          <img src={p.image} className="w-10 h-10 object-cover rounded-lg border border-charcoal shrink-0" alt={p.name} />
                          <div>
                            <h4 className="text-xs font-extrabold text-charcoal truncate max-w-[120px]">{p.name}</h4>
                            <span className="text-xs font-black text-charcoal">₹{p.price}</span>
                          </div>
                        </div>
                        <div className="flex items-center gap-1.5">
                          <button onClick={() => handleAddToCart(p)} className="p-2 rounded-xl bg-peach text-white border-2 border-charcoal hover:bg-peachHover shadow-brutalist-sm">
                            <Icons.Plus className="w-4 h-4" />
                          </button>
                          <button onClick={() => handleToggleWishlist(p.id)} className="p-2 rounded-xl bg-white border-2 border-charcoal hover:bg-cream text-rose-500">
                            <Icons.X className="w-4 h-4" />
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>

            </div>

            {/* Price Alerts */}
            <div className="space-y-6">
              
              <div className="bg-white p-5 rounded-3xl border-4 border-charcoal space-y-4 shadow-brutalist">
                <h3 className="text-sm font-black uppercase text-charcoal flex items-center gap-2 border-b-2 border-charcoal pb-2">
                  <Icons.Bell className="w-4.5 h-4.5 text-peach" />
                  Set Threshold Alerts
                </h3>

                <form onSubmit={addPriceAlert} className="space-y-4">
                  <div className="space-y-1">
                    <label className="text-[9px] font-black text-gray-500 uppercase block">Catalog Item</label>
                    <select 
                      value={alertName}
                      onChange={(e) => setAlertName(e.target.value)}
                      className="w-full p-2.5 bg-cream border-2 border-charcoal rounded-xl text-xs font-black focus:outline-none"
                    >
                      {catalog.map(p => (
                        <option key={p.id} value={p.name}>{p.name} (₹{p.price})</option>
                      ))}
                    </select>
                  </div>

                  <div className="space-y-1">
                    <label className="text-[9px] font-black text-gray-500 uppercase block">Alert Threshold (₹)</label>
                    <input 
                      type="number" 
                      value={alertTarget}
                      onChange={(e) => setAlertTarget(e.target.value)}
                      className="w-full p-2.5 bg-cream border-2 border-charcoal rounded-xl text-xs font-black focus:outline-none"
                    />
                  </div>

                  <button type="submit" className="w-full py-2.5 bg-charcoal text-white rounded-xl text-xs font-black uppercase border-2 border-charcoal shadow-brutalist-sm hover:translate-y-[-1px] transition-all">
                    Register Price Alert
                  </button>
                </form>

                {/* List of alerts */}
                <div className="space-y-2 pt-3 border-t-2 border-charcoal">
                  <span className="text-[9px] font-black text-gray-500 uppercase block">Active Alerts</span>
                  {priceAlerts.map(alert => (
                    <div key={alert.id} className="p-3 bg-cream border-2 border-charcoal rounded-2xl flex items-center justify-between text-xs font-semibold shadow-brutalist-sm">
                      <div>
                        <p className="font-extrabold text-charcoal truncate max-w-[120px]">{alert.productName}</p>
                        <span className="text-[9px] text-gray-400 block mt-0.5">Alert if &lt; ₹{alert.targetPrice} (Now: ₹{alert.currentPrice})</span>
                      </div>
                      <button onClick={() => removePriceAlert(alert.id)} className="text-gray-400 hover:text-rose-500">
                        <Icons.X className="w-4 h-4" />
                      </button>
                    </div>
                  ))}
                </div>
              </div>

            </div>

          </div>

        </div>
      );
    }

    // --- ADMIN PANEL ---
    function AdminPanel({ competitorMultipliers, setCompetitorMultipliers, catalog, setCatalog, showNotification }) {
      
      const handleMultiplierChange = (compKey, value) => {
        const val = parseFloat(value);
        if (isNaN(val)) return;
        setCompetitorMultipliers(prev => ({
          ...prev,
          [compKey]: val
        }));
        showNotification(`Modified competitor ${compKey} pricing factor.`);
      };

      const toggleStock = (prodId) => {
        setCatalog(prev => prev.map(p => {
          if (p.id === prodId) {
            const hasStock = p.specs["Stock Status"] !== "Out of Stock";
            return {
              ...p,
              specs: {
                ...p.specs,
                "Stock Status": hasStock ? "Out of Stock" : "In Stock"
              }
            };
          }
          return p;
        }));
        showNotification("Catalog stock modified");
      };

      return (
        <div className="space-y-8 text-left">
          
          <div className="bg-white p-6 rounded-3xl border-4 border-charcoal shadow-brutalist space-y-1">
            <span className="text-[10px] font-black text-white bg-peach px-2.5 py-0.5 rounded border border-charcoal uppercase tracking-wider">SYSTEM PANEL</span>
            <h2 className="text-2xl font-black text-charcoal uppercase mt-1">ShopWise Engine Control</h2>
            <p className="text-xs text-gray-500 font-semibold">Tweak live competitor markup metrics and item availability indexes.</p>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            {/* Competitor Modifiers */}
            <div className="bg-white p-5 rounded-3xl border-4 border-charcoal space-y-5 shadow-brutalist lg:col-span-1">
              <h3 className="text-sm font-black uppercase text-charcoal flex items-center gap-2 border-b-2 border-charcoal pb-2">
                <Icons.Store className="w-4.5 h-4.5 text-peach" />
                Live Competitor Markups
              </h3>

              <div className="space-y-4">
                {Object.keys(COMPETITORS).map(compKey => (
                  <div key={compKey} className="space-y-1.5">
                    <div className="flex justify-between text-xs font-extrabold uppercase">
                      <span>{COMPETITORS[compKey].name} Factor</span>
                      <strong className="text-peach">{competitorMultipliers[compKey]}x</strong>
                    </div>
                    <input 
                      type="range" 
                      min="0.7" 
                      max="1.3" 
                      step="0.01" 
                      value={competitorMultipliers[compKey]}
                      onChange={(e) => handleMultiplierChange(compKey, e.target.value)}
                      className="w-full accent-peach"
                    />
                  </div>
                ))}
              </div>
            </div>

            {/* Catalog Stock manager */}
            <div className="bg-white p-5 rounded-3xl border-4 border-charcoal space-y-4 shadow-brutalist lg:col-span-2">
              <h3 className="text-sm font-black uppercase text-charcoal flex items-center gap-2 border-b-2 border-charcoal pb-2">
                <Icons.Database className="w-4.5 h-4.5 text-peach" />
                Catalog Directory Stock Manager
              </h3>

              <div className="divide-y-2 divide-charcoal/10 max-h-80 overflow-y-auto pr-2">
                {catalog.map(p => {
                  const isOutOfStock = p.specs["Stock Status"] === "Out of Stock";
                  return (
                    <div key={p.id} className="py-2.5 flex items-center justify-between gap-3 text-xs font-semibold">
                      <div className="flex items-center gap-3">
                        <img src={p.image} className="w-9 h-9 object-cover rounded-lg border border-charcoal" alt={p.name} />
                        <div>
                          <p className="font-extrabold text-charcoal truncate max-w-[170px]">{p.name}</p>
                          <span className="text-[9px] text-gray-400">Base Price: ₹{p.price}</span>
                        </div>
                      </div>

                      <button
                        onClick={() => toggleStock(p.id)}
                        className={`px-3 py-1.5 rounded-xl font-black text-[9px] uppercase border border-charcoal transition-all ${
                          isOutOfStock 
                            ? 'bg-rose-50 text-rose-600 hover:bg-rose-100 shadow-brutalist-sm hover:translate-y-[-1px]' 
                            : 'bg-cream text-sage hover:bg-green-100 shadow-brutalist-sm hover:translate-y-[-1px]'
                        }`}
                      >
                        {isOutOfStock ? "Out of Stock" : "In Stock"}
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>

          </div>

        </div>
      );
    }

    // --- ADDRESS PICKER MODAL ---
    function AddressPickerModal({ addresses, setAddresses, onClose }) {
      const [newLabel, setNewLabel] = useState('Work');
      const [newText, setNewText] = useState('');

      const selectAddress = (id) => {
        setAddresses(prev => prev.map(a => ({
          ...a,
          active: a.id === id
        })));
        onClose();
      };

      const addAddress = (e) => {
        e.preventDefault();
        if (newText.trim() === '') return;
        const newAddr = {
          id: Date.now(),
          label: newLabel,
          text: newText,
          active: false
        };
        setAddresses(prev => [...prev, newAddr]);
        setNewText('');
        setNewLabel('Other');
      };

      return (
        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in" onClick={onClose}>
          <div 
            onClick={(e) => e.stopPropagation()}
            className="bg-white rounded-[32px] max-w-md w-full p-6 space-y-6 border-4 border-charcoal shadow-brutalist-lg relative animate-pop-in text-left"
          >
            <button onClick={onClose} className="absolute top-4 right-4 p-2 rounded-xl bg-cream border-2 border-charcoal hover:bg-peach/10 shadow-brutalist-sm">
              <Icons.X className="w-5 h-5" />
            </button>

            <div>
              <h3 className="text-lg font-black uppercase text-charcoal">Select Delivery Point</h3>
              <p className="text-xs text-gray-500 font-semibold mt-1">Aggregated store comparison parameters will update to map local dark-store networks.</p>
            </div>

            {/* List */}
            <div className="space-y-3">
              {addresses.map(addr => (
                <div 
                  key={addr.id}
                  onClick={() => selectAddress(addr.id)}
                  className={`p-3.5 rounded-2xl border-2 border-charcoal cursor-pointer flex items-start gap-3 transition-all ${
                    addr.active ? 'bg-cream shadow-brutalist-sm' : 'bg-white shadow-brutalist-sm hover:translate-y-[-1px]'
                  }`}
                >
                  <Icons.MapPin className={`w-4 h-4 mt-0.5 shrink-0 ${addr.active ? 'text-peach' : 'text-gray-400'}`} />
                  <div>
                    <span className="font-black text-xs text-charcoal block">{addr.label}</span>
                    <span className="text-[11px] text-gray-400 font-semibold mt-1 block truncate max-w-[260px]">{addr.text}</span>
                  </div>
                </div>
              ))}
            </div>

            {/* Form */}
            <form onSubmit={addAddress} className="border-t-2 border-charcoal pt-4 space-y-3">
              <span className="text-[9px] font-black text-gray-500 uppercase tracking-widest block">Add New Location</span>
              <div className="flex gap-2">
                {['Work', 'Gym', 'Other'].map(lbl => (
                  <button 
                    key={lbl}
                    type="button"
                    onClick={() => setNewLabel(lbl)}
                    className={`px-3 py-1.5 rounded-lg text-[10px] font-black border transition-all ${
                      newLabel === lbl ? 'bg-charcoal text-white border-charcoal' : 'bg-cream text-gray-500 border-transparent'
                    }`}
                  >
                    {lbl}
                  </button>
                ))}
              </div>

              <input 
                type="text" 
                placeholder="Enter complete building name, BKC road details..."
                value={newText}
                onChange={(e) => setNewText(e.target.value)}
                className="w-full p-2.5 bg-cream border-2 border-charcoal rounded-xl text-xs font-semibold focus:outline-none"
              />

              <button type="submit" className="w-full py-2.5 bg-peach text-white hover:bg-peachHover rounded-xl text-xs font-black uppercase border-2 border-charcoal shadow-brutalist-sm">
                Save Address
              </button>
            </form>

          </div>
        </div>
      );
    }

    // --- MOUNT APP ---
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

  </script>

</body>
</html>
